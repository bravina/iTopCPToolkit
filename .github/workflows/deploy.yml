name: Build and push Docker image

on:
  push:
    branches:
      - main
    paths:
      - 'VERSION'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Docker login to CERN registry
        run: |
          echo "${{ secrets.CERN_REGISTRY_TOKEN }}" | \
            docker login registry.cern.ch \
              -u "${{ secrets.CERN_REGISTRY_USER }}" \
              --password-stdin

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: registry.cern.ch/itopcptoolkit/itopcptoolkit:latest
          build-args: |
            AB_TAG=${{ vars.AB_TAG }}
            TCT_VERSION=${{ vars.TCT_VERSION }}
          secrets: |
            cern_token=${{ secrets.CERN_TOKEN }}
          cache-from: type=registry,ref=registry.cern.ch/itopcptoolkit/itopcptoolkit:buildcache
          cache-to: type=registry,ref=registry.cern.ch/itopcptoolkit/itopcptoolkit:buildcache,mode=max
